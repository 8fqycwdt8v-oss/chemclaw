name: redact-secrets
lifecycle: pre_tool
enabled: true
# No script — uses the built-in TypeScript implementation in
# services/agent-claw/src/core/hooks/redact-secrets.ts
definition:
  description: >
    Scan tool input strings for sensitive patterns (SMILES, reaction SMILES,
    emails, NCE project IDs, compound codes) and replace matches with
    [REDACTED] before the tool executes. Appends a structured redaction log
    to ctx.scratchpad.redact_log for observability.
  patterns:
    - name: rxn_smiles
      description: Reaction SMILES with two > separators
    - name: smiles
      description: SMILES-like token (bond grammar heuristic)
    - name: email
      description: Email address (Entra-ID and operator emails)
    - name: nce_project
      description: Internal NCE project identifier (NCE-\d{1,6})
    - name: compound_code
      description: Internal compound code (CMP-\d{4,8})
