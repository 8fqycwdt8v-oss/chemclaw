name: redact-secrets
# Registrar wires this at post_turn (defense-in-depth scrub of outbound
# assistant text). The historical pre_tool registration was a regression
# — it mangled tool inputs (e.g. SMILES → [REDACTED]) before chemistry
# tools saw them. Keep this field in sync with the registrar's
# lifecycle.on(...) call; hook-loader-coverage.test.ts asserts parity.
lifecycle: post_turn
enabled: true
# No script — uses the built-in TypeScript implementation in
# services/agent-claw/src/core/hooks/redact-secrets.ts
definition:
  description: >
    Defense-in-depth scrub of the assistant's outbound text on the way out
    (post_turn). The PRIMARY egress redactor is the LiteLLM callback at
    services/litellm_redactor/callback.py which scrubs prompts going TO the
    model. This hook scrubs the model's final response text and any
    accumulated stream-delta replacements, replacing matches for sensitive
    patterns (SMILES, reaction SMILES, emails, NCE project IDs, compound
    codes) with [REDACTED]. Appends a structured redaction log to
    ctx.scratchpad.redact_log for observability.
  patterns:
    - name: rxn_smiles
      description: Reaction SMILES with two > separators
    - name: smiles
      description: SMILES-like token (bond grammar heuristic)
    - name: email
      description: Email address (Entra-ID and operator emails)
    - name: nce_project
      description: Internal NCE project identifier (NCE-\d{1,6})
    - name: compound_code
      description: Internal compound code (CMP-\d{4,8})
