# Default values for ChemClaw Helm chart.
# Profile flags (all false by default — enable in prod-values.yaml).
# Override per environment: helm install -f prod-values.yaml

global:
  imageRegistry: ""
  imagePullPolicy: IfNotPresent
  # Postgres connection shared across all services.
  postgres:
    host: postgres
    port: 5432
    db: chemclaw
    user: chemclaw
    passwordSecret: chemclaw-pg-password
    passwordKey: password
  # LOG_USER_SALT — salts the per-user hash that flows into Loki log
  # records and the audit_log table. Required outside dev mode; the
  # TS / Python helpers throw at first use when unset and
  # CHEMCLAW_DEV_MODE != true. Generate via `openssl rand -hex 32`.
  #
  # CRITICAL: this value MUST match the Postgres `app.log_user_salt`
  # parameter set via:
  #   ALTER DATABASE chemclaw SET app.log_user_salt = '<same-value>';
  # Otherwise audit_log hashes will not line up with Loki user hashes
  # for the same person, breaking cross-layer correlation.
  #
  # Leave secretName empty for dev clusters running with
  # CHEMCLAW_DEV_MODE=true (this chart does not set that flag; it is
  # the operator's responsibility).
  logUserSalt:
    secretName: ""    # e.g. chemclaw-log-user-salt
    secretKey: salt
  # MCP Bearer-token signing key (ADR 006). Required outside dev mode;
  # generate via `openssl rand -hex 32`. When unset, agent-claw mints
  # no JWTs and Python MCP services accept unsigned requests only when
  # MCP_AUTH_DEV_MODE=true is also set.
  mcpAuth:
    signingKeySecret: ""    # e.g. chemclaw-mcp-auth-signing-key
    signingKeyField: key

# ── Core services (always deployed) ──────────────────────────────────────────

agentClaw:
  enabled: true
  image: chemclaw/agent-claw:latest
  port: 3101
  replicas: 1
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

paperclipLite:
  enabled: true
  image: chemclaw/paperclip:latest
  port: 3200
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

litellm:
  enabled: true
  image: chemclaw/litellm:latest
  port: 4000
  replicas: 1

litellmRedactor:
  enabled: true
  image: chemclaw/litellm-redactor:latest
  port: 4001
  replicas: 1

# Projectors (always-on background workers)
projectors:
  chunkEmbedder:
    enabled: true
    image: chemclaw/chunk-embedder:latest
  reactionVectorizer:
    enabled: true
    image: chemclaw/reaction-vectorizer:latest
  kgExperiments:
    enabled: true
    image: chemclaw/kg-experiments:latest
  kgHypotheses:
    enabled: true
    image: chemclaw/kg-hypotheses:latest
  compoundFingerprinter:
    enabled: true
    image: chemclaw/compound-fingerprinter:latest
  compoundClassifier:
    enabled: true
    image: chemclaw/compound-classifier:latest
  conditionsNormalizer:
    enabled: true
    image: chemclaw/conditions-normalizer:latest
  qmKg:
    enabled: true
    image: chemclaw/qm-kg:latest
  contextualChunker:
    # LLM-context chunk-prefix projector. Requires LITELLM_BASE_URL.
    enabled: true
    image: chemclaw/contextual-chunker:latest

