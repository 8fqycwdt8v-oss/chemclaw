# ── Profile: sources ──────────────────────────────────────────────────────────
# Source-system MCP adapters bundled here: mcp-logs-sciy (LOGS-by-SciY adapter
# with fake-postgres + real backends). The mcp-eln-local mock ELN ships under
# the testbed profile (below). The kg-source-cache projector consumes events
# from both via the unchanged source-cache hook regex
# /^(query|fetch)_(eln|lims|instrument)_/.

sources:
  enabled: false
  mcpLogsSciy:
    image: chemclaw/mcp-logs-sciy:latest
    port: 8016
    replicas: 1
    backend: fake-postgres        # fake-postgres | real
    # Real-backend tenant config (gated; ignored when backend=fake-postgres):
    realTenantHost: ""
    realApiKeySecret: ""
    realApiKeySecretKey: api-key
  kgSourceCache:
    image: chemclaw/kg-source-cache:latest
    replicas: 1

# ── Profile: testbed ─────────────────────────────────────────────────────────
# Enable with: --set testbed.enabled=true
# Hosts the local mock ELN. Hermetic; never used for production data.

testbed:
  enabled: false
  mcpElnLocal:
    image: chemclaw/mcp-eln-local:latest
    port: 8013
    replicas: 1
    # The mock_eln Postgres schema must be seeded separately (make seed.mock_eln).
    # Reader role: chemclaw_mock_eln_reader (created by db/init/30_mock_eln_schema.sql).
    readerPasswordSecret: chemclaw-mock-eln-reader-password
    readerPasswordSecretKey: password

# ── Profile: optimizer ───────────────────────────────────────────────────────
# Enable with: --set optimizer.enabled=true

optimizer:
  enabled: false
  gepaRunner:
    image: chemclaw/gepa-runner:latest
    schedule: "0 2 * * *"  # nightly at 02:00
    replicas: 1
  skillPromoter:
    image: chemclaw/skill-promoter:latest
    schedule: "30 2 * * *"  # nightly at 02:30
    replicas: 1
  forgedToolValidator:
    image: chemclaw/forged-tool-validator:latest
    schedule: "0 3 * * *"  # nightly at 03:00
    replicas: 1
  # session-purger is a long-running Deployment, not a CronJob — it ticks
  # internally on POLL_INTERVAL_SECONDS so we save the cold-start overhead.
  sessionPurger:
    image: chemclaw/session-purger:latest
    pollIntervalSeconds: 3600
    batchSize: 1000
    minAgeHours: 1
  # audit-partition-maintainer keeps audit_log monthly partitions ahead
  # of the clock so audit-trigger writes don't hit a missing partition.
  auditPartitionMaintainer:
    image: chemclaw/audit-partition-maintainer:latest
    monthsAhead: 3
    pollIntervalSeconds: 86400

# ── Profile: observability ───────────────────────────────────────────────────
# Enable with: --set observability.enabled=true

observability:
  enabled: false
  langfuse:
    image: langfuse/langfuse:latest
    port: 3000
    replicas: 1
    secretKey: langfuse-secrets
  langfuseClickhouse:
    image: clickhouse/clickhouse-server:latest
    replicas: 1
  langfusePostgres:
    image: postgres:16
    replicas: 1
  contextualChunker:
    image: chemclaw/contextual-chunker:latest
    replicas: 1

# ── Profile: backups (Phase 4 of the configuration concept) ──────────────────
# Daily encrypted backups of Postgres + Neo4j to S3-compatible storage.
# Run `make backup.test-restore` locally to validate a restore against
# a transient compose stack. See docs/runbooks/backup-and-restore.md.

backups:
  enabled: false
  # `age` recipient public key — same key restores both jobs.
  # Generate the key pair with `age-keygen`; keep the private key in a
  # vault, NOT a Kubernetes secret (cluster ops should not be able to
  # decrypt dumps without separate authorisation).
  ageRecipient: ""
  retentionDays: 30
  s3:
    endpoint: ""             # e.g. https://s3.us-east-1.amazonaws.com
    bucket: ""
    prefix: ""               # optional sub-path inside the bucket
    credentialsSecret: chemclaw-backup-s3-credentials
  postgres:
    image: chemclaw/postgres-backup:latest
    schedule: "0 1 * * *"    # nightly at 01:00 — comfortably before optimizer
    tmpSize: 10Gi
  neo4j:
    image: chemclaw/neo4j-backup:latest
    schedule: "30 1 * * *"   # nightly at 01:30
    uri: bolt://neo4j:7687
    user: neo4j
    passwordSecret: chemclaw-neo4j-password
    tmpSize: 20Gi
