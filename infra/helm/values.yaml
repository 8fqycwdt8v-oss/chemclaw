    replicas: 1
  mcpTabicl:
    image: chemclaw/mcp-tabicl:latest
    port: 8005
    replicas: 1
  mcpDocFetcher:
    image: chemclaw/mcp-doc-fetcher:latest
    port: 8006
    replicas: 1
  mcpAskcos:
    image: chemclaw/mcp-askcos:latest
    port: 8007
    replicas: 1
  mcpAizynth:
    image: chemclaw/mcp-aizynth:latest
    port: 8008
    replicas: 1
  mcpChemprop:
    image: chemclaw/mcp-chemprop:latest
    port: 8009
    replicas: 1
  mcpXtb:
    image: chemclaw/mcp-xtb:latest
    port: 8010
    replicas: 1
  mcpSynthegyMech:
    image: chemclaw/mcp-synthegy-mech:latest
