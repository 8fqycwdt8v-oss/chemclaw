# Default values for ChemClaw Helm chart.
# Profile flags (all false by default — enable in prod-values.yaml).
# Override per environment: helm install -f prod-values.yaml

global:
  imageRegistry: ""
  imagePullPolicy: IfNotPresent
  # Postgres connection shared across all services.
  postgres:
    host: postgres
    port: 5432
    db: chemclaw
    user: chemclaw
    passwordSecret: chemclaw-pg-password
    passwordKey: password

# ── Core services (always deployed) ──────────────────────────────────────────

agentClaw:
  enabled: true
  image: chemclaw/agent-claw:latest
  port: 3101
  replicas: 1
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1000m, memory: 1Gi }

paperclipLite:
  enabled: true
  image: chemclaw/paperclip:latest
  port: 3200
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

litellm:
  enabled: true
  image: chemclaw/litellm:latest
  port: 4000
  replicas: 1

litellmRedactor:
  enabled: true
  image: chemclaw/litellm-redactor:latest
  port: 4001
  replicas: 1

# Projectors (always-on background workers)
projectors:
  chunkEmbedder:
    enabled: true
    image: chemclaw/chunk-embedder:latest
  reactionVectorizer:
    enabled: true
    image: chemclaw/reaction-vectorizer:latest
  kgExperiments:
    enabled: true
    image: chemclaw/kg-experiments:latest
  kgHypotheses:
    enabled: true
    image: chemclaw/kg-hypotheses:latest

# ── Profile: chemistry ────────────────────────────────────────────────────────
# Enable with: --set chemistry.enabled=true
# or in prod-values.yaml: chemistry: { enabled: true }

chemistry:
  enabled: false
  mcpRdkit:
    image: chemclaw/mcp-rdkit:latest
    port: 8001
    replicas: 1
  mcpDrfp:
    image: chemclaw/mcp-drfp:latest
    port: 8002
    replicas: 1
  mcpKg:
    image: chemclaw/mcp-kg:latest
    port: 8003
    replicas: 1
  mcpEmbedder:
    image: chemclaw/mcp-embedder:latest
    port: 8004
    replicas: 1
  mcpTabicl:
    image: chemclaw/mcp-tabicl:latest
    port: 8005
    replicas: 1
  mcpDocFetcher:
    image: chemclaw/mcp-doc-fetcher:latest
    port: 8006
    replicas: 1
  mcpAskcos:
    image: chemclaw/mcp-askcos:latest
    port: 8007
    replicas: 1
  mcpAizynth:
    image: chemclaw/mcp-aizynth:latest
    port: 8008
    replicas: 1
  mcpChemprop:
    image: chemclaw/mcp-chemprop:latest
    port: 8009
    replicas: 1
  mcpXtb:
    image: chemclaw/mcp-xtb:latest
    port: 8010
    replicas: 1
  mcpSirius:
    image: chemclaw/mcp-sirius:latest
    port: 8012
    replicas: 1

# ── Profile: sources ──────────────────────────────────────────────────────────
# Source-system MCP adapters bundled here: mcp-logs-sciy (LOGS-by-SciY adapter
# with fake-postgres + real backends). The mcp-eln-local mock ELN ships under
# the testbed profile (below). The kg-source-cache projector consumes events
# from both via the unchanged source-cache hook regex
# /^(query|fetch)_(eln|lims|instrument)_/.

sources:
  enabled: false
  mcpLogsSciy:
    image: chemclaw/mcp-logs-sciy:latest
    port: 8016
    replicas: 1
    backend: fake-postgres        # fake-postgres | real
    # Real-backend tenant config (gated; ignored when backend=fake-postgres):
    realTenantHost: ""
    realApiKeySecret: ""
    realApiKeySecretKey: api-key
  kgSourceCache:
    image: chemclaw/kg-source-cache:latest
    replicas: 1

# ── Profile: testbed ─────────────────────────────────────────────────────────
# Enable with: --set testbed.enabled=true
# Hosts the local mock ELN. Hermetic; never used for production data.

testbed:
  enabled: false
  mcpElnLocal:
    image: chemclaw/mcp-eln-local:latest
    port: 8013
    replicas: 1
    # The mock_eln Postgres schema must be seeded separately (make seed.mock_eln).
    # Reader role: chemclaw_mock_eln_reader (created by db/init/30_mock_eln_schema.sql).
    readerPasswordSecret: chemclaw-mock-eln-reader-password
    readerPasswordSecretKey: password

# ── Profile: optimizer ───────────────────────────────────────────────────────
# Enable with: --set optimizer.enabled=true

optimizer:
  enabled: false
  gepaRunner:
    image: chemclaw/gepa-runner:latest
    schedule: "0 2 * * *"  # nightly at 02:00
    replicas: 1
  skillPromoter:
    image: chemclaw/skill-promoter:latest
    schedule: "30 2 * * *"  # nightly at 02:30
    replicas: 1
  forgedToolValidator:
    image: chemclaw/forged-tool-validator:latest
    schedule: "0 3 * * *"  # nightly at 03:00
    replicas: 1
  # session-purger is a long-running Deployment, not a CronJob — it ticks
  # internally on POLL_INTERVAL_SECONDS so we save the cold-start overhead.
  sessionPurger:
    image: chemclaw/session-purger:latest
    pollIntervalSeconds: 3600
    batchSize: 1000
    minAgeHours: 1

# ── Profile: observability ───────────────────────────────────────────────────
# Enable with: --set observability.enabled=true

observability:
  enabled: false
  langfuse:
    image: langfuse/langfuse:latest
    port: 3000
    replicas: 1
    secretKey: langfuse-secrets
  langfuseClickhouse:
    image: clickhouse/clickhouse-server:latest
    replicas: 1
  langfusePostgres:
    image: postgres:16
    replicas: 1
  contextualChunker:
    image: chemclaw/contextual-chunker:latest
    replicas: 1
