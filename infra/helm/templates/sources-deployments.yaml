# Source-system MCP adapter deployments — enabled when sources.enabled=true
{{- if .Values.sources.enabled }}

# ── mcp-eln-benchling ─────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-eln-benchling
  labels:
    app: mcp-eln-benchling
    profile: sources
spec:
  replicas: {{ .Values.sources.mcpElnBenchling.replicas }}
  selector:
    matchLabels:
      app: mcp-eln-benchling
  template:
    metadata:
      labels:
        app: mcp-eln-benchling
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: mcp-eln-benchling
          image: {{ .Values.sources.mcpElnBenchling.image }}
          ports:
            - containerPort: {{ .Values.sources.mcpElnBenchling.port }}
          env:
            - name: BENCHLING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sources.mcpElnBenchling.apiKeySecret }}
                  key: {{ .Values.sources.mcpElnBenchling.apiKeySecretKey }}
            - name: BENCHLING_BASE_URL
              value: {{ .Values.sources.mcpElnBenchling.baseUrl }}
          securityContext:
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-eln-benchling
spec:
  selector:
    app: mcp-eln-benchling
  ports:
    - port: {{ .Values.sources.mcpElnBenchling.port }}
      targetPort: {{ .Values.sources.mcpElnBenchling.port }}

# ── mcp-lims-starlims ─────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-lims-starlims
  labels:
    app: mcp-lims-starlims
    profile: sources
spec:
  replicas: {{ .Values.sources.mcpLimsStarlims.replicas }}
  selector:
    matchLabels:
      app: mcp-lims-starlims
  template:
    metadata:
      labels:
