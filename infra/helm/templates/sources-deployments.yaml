# Source-system deployments — enabled when sources.enabled=true
#
# No source-system MCP adapters (ELN/LIMS/instrument) are bundled in this
# build. The kg-source-cache projector is kept so that future adapters
# matching the source-cache hook regex (/^(query|fetch)_(eln|lims|instrument)_/)
# can plug in without redeploying the projector.
{{- if .Values.sources.enabled }}

# ── kg-source-cache projector ─────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kg-source-cache
  labels:
    app: kg-source-cache
    profile: sources
spec:
  replicas: {{ .Values.sources.kgSourceCache.replicas }}
  selector:
    matchLabels:
      app: kg-source-cache
  template:
    metadata:
      labels:
        app: kg-source-cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: kg-source-cache
          image: {{ .Values.sources.kgSourceCache.image }}
          env:
            - name: POSTGRES_HOST
              value: {{ .Values.global.postgres.host }}
            - name: POSTGRES_DB
              value: {{ .Values.global.postgres.db }}
            - name: POSTGRES_USER
              value: {{ .Values.global.postgres.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.postgres.passwordSecret }}
                  key: {{ .Values.global.postgres.passwordKey }}
          securityContext:
            allowPrivilegeEscalation: false

{{- end }}
