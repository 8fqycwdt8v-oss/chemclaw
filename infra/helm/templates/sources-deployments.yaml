# Source-system deployments — enabled when sources.enabled=true
#
# Bundled: mcp-logs-sciy (LOGS-by-SciY analytical SDMS adapter, two backends).
# The kg-source-cache projector consumes ingestion events from this MCP via
# the source-cache post-tool hook (regex unchanged).
{{- if .Values.sources.enabled }}

# ── mcp-logs-sciy ────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-logs-sciy
  labels:
    app: mcp-logs-sciy
    profile: sources
spec:
  replicas: {{ .Values.sources.mcpLogsSciy.replicas }}
  selector:
    matchLabels:
      app: mcp-logs-sciy
  template:
    metadata:
      labels:
        app: mcp-logs-sciy
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: mcp-logs-sciy
          image: {{ .Values.sources.mcpLogsSciy.image }}
          ports:
            - containerPort: {{ .Values.sources.mcpLogsSciy.port }}
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: LOGS_BACKEND
              value: {{ .Values.sources.mcpLogsSciy.backend | quote }}
            {{- if eq .Values.sources.mcpLogsSciy.backend "real" }}
            - name: LOGS_TENANT_HOST
              value: {{ .Values.sources.mcpLogsSciy.realTenantHost | quote }}
            - name: LOGS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sources.mcpLogsSciy.realApiKeySecret }}
                  key: {{ .Values.sources.mcpLogsSciy.realApiKeySecretKey }}
            {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-logs-sciy
spec:
  selector:
    app: mcp-logs-sciy
  ports:
    - port: {{ .Values.sources.mcpLogsSciy.port }}
      targetPort: {{ .Values.sources.mcpLogsSciy.port }}

# ── kg-source-cache projector ─────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kg-source-cache
  labels:
    app: kg-source-cache
    profile: sources
spec:
  replicas: {{ .Values.sources.kgSourceCache.replicas }}
  selector:
    matchLabels:
      app: kg-source-cache
  template:
    metadata:
      labels:
        app: kg-source-cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: kg-source-cache
          image: {{ .Values.sources.kgSourceCache.image }}
          env:
            - name: POSTGRES_HOST
              value: {{ .Values.global.postgres.host }}
            - name: POSTGRES_DB
              value: {{ .Values.global.postgres.db }}
            - name: POSTGRES_USER
              value: {{ .Values.global.postgres.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.postgres.passwordSecret }}
                  key: {{ .Values.global.postgres.passwordKey }}
          securityContext:
            allowPrivilegeEscalation: false

{{- end }}
