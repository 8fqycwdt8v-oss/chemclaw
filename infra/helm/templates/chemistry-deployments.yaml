# Chemistry MCP service deployments — enabled when chemistry.enabled=true
{{- if .Values.chemistry.enabled }}

{{- $chemServices := list
  (dict "name" "mcp-rdkit"               "image" .Values.chemistry.mcpRdkit.image               "port" .Values.chemistry.mcpRdkit.port)
  (dict "name" "mcp-drfp"                "image" .Values.chemistry.mcpDrfp.image                "port" .Values.chemistry.mcpDrfp.port)
  (dict "name" "mcp-kg"                  "image" .Values.chemistry.mcpKg.image                  "port" .Values.chemistry.mcpKg.port)
  (dict "name" "mcp-embedder"            "image" .Values.chemistry.mcpEmbedder.image            "port" .Values.chemistry.mcpEmbedder.port)
  (dict "name" "mcp-tabicl"              "image" .Values.chemistry.mcpTabicl.image              "port" .Values.chemistry.mcpTabicl.port)
  (dict "name" "mcp-doc-fetcher"         "image" .Values.chemistry.mcpDocFetcher.image          "port" .Values.chemistry.mcpDocFetcher.port)
  (dict "name" "mcp-askcos"              "image" .Values.chemistry.mcpAskcos.image              "port" .Values.chemistry.mcpAskcos.port)
  (dict "name" "mcp-aizynth"             "image" .Values.chemistry.mcpAizynth.image             "port" .Values.chemistry.mcpAizynth.port)
  (dict "name" "mcp-chemprop"            "image" .Values.chemistry.mcpChemprop.image            "port" .Values.chemistry.mcpChemprop.port)
  (dict "name" "mcp-xtb"                 "image" .Values.chemistry.mcpXtb.image                 "port" .Values.chemistry.mcpXtb.port)
  (dict "name" "mcp-synthegy-mech"       "image" .Values.chemistry.mcpSynthegyMech.image        "port" .Values.chemistry.mcpSynthegyMech.port)
  (dict "name" "mcp-sirius"              "image" .Values.chemistry.mcpSirius.image              "port" .Values.chemistry.mcpSirius.port)
  (dict "name" "mcp-crest"               "image" .Values.chemistry.mcpCrest.image               "port" .Values.chemistry.mcpCrest.port)
  (dict "name" "mcp-yield-baseline"      "image" .Values.chemistry.mcpYieldBaseline.image       "port" .Values.chemistry.mcpYieldBaseline.port)
  (dict "name" "mcp-applicability-domain" "image" .Values.chemistry.mcpApplicabilityDomain.image "port" .Values.chemistry.mcpApplicabilityDomain.port)
  (dict "name" "mcp-reaction-optimizer"  "image" .Values.chemistry.mcpReactionOptimizer.image   "port" .Values.chemistry.mcpReactionOptimizer.port)
  (dict "name" "mcp-green-chemistry"     "image" .Values.chemistry.mcpGreenChemistry.image      "port" .Values.chemistry.mcpGreenChemistry.port)
  (dict "name" "mcp-plate-designer"      "image" .Values.chemistry.mcpPlateDesigner.image       "port" .Values.chemistry.mcpPlateDesigner.port)
  (dict "name" "mcp-ord-io"              "image" .Values.chemistry.mcpOrdIo.image               "port" .Values.chemistry.mcpOrdIo.port)
  (dict "name" "mcp-genchem"             "image" .Values.chemistry.mcpGenchem.image             "port" .Values.chemistry.mcpGenchem.port)
}}

{{- /* Plumbing services on the chemistry profile that have no exposed HTTP port.
     Rendered as Deployments below the MCP loop so they don't produce a Service. */ -}}
{{- $chemWorkers := list
  (dict "name" "workflow-engine" "image" .Values.chemistry.workflowEngine.image)
  (dict "name" "queue-worker"    "image" .Values.chemistry.queueWorker.image)
}}

{{- range $chemServices }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  labels:
    app: {{ .name }}
    profile: chemistry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: {{ .name }}
          image: {{ .image }}
          ports:
            - containerPort: {{ .port }}
          securityContext:
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
spec:
  selector:
    app: {{ .name }}
  ports:
    - port: {{ .port }}
      targetPort: {{ .port }}
{{- end }}

{{- range $chemWorkers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  labels:
    app: {{ .name }}
    profile: chemistry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: {{ .name }}
          image: {{ .image }}
          securityContext:
            allowPrivilegeEscalation: false
{{- end }}

{{- end }}
