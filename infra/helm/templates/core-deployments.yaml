# Core deployments — always deployed regardless of profile flags.
# Includes: agent-claw, paperclip-lite, litellm, litellm-redactor,
# and always-on projectors.

# ── agent-claw ────────────────────────────────────────────────────────────────
{{- if .Values.agentClaw.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-claw
  labels:
    app: agent-claw
    {{ include "chemclaw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.agentClaw.replicas }}
  selector:
    matchLabels:
      app: agent-claw
  template:
    metadata:
      labels:
        app: agent-claw
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: agent-claw
          image: {{ .Values.agentClaw.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.agentClaw.port }}
          env:
            - name: POSTGRES_HOST
              value: {{ .Values.global.postgres.host }}
            - name: POSTGRES_DB
              value: {{ .Values.global.postgres.db }}
            - name: POSTGRES_USER
              value: {{ .Values.global.postgres.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.postgres.passwordSecret }}
                  key: {{ .Values.global.postgres.passwordKey }}
            # LOG_USER_SALT is required outside dev mode (see
            # services/agent-claw/src/observability/user-hash.ts) and
            # must match the Postgres `app.log_user_salt` parameter
            # so audit_log hashes line up with Loki user hashes for
            # the same person. The Helm chart's NOTES.txt reminds the
            # operator to run:
            #   ALTER DATABASE chemclaw SET app.log_user_salt = '<same value>';
            {{- if .Values.global.logUserSalt.secretName }}
            - name: LOG_USER_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.logUserSalt.secretName }}
                  key: {{ .Values.global.logUserSalt.secretKey | default "salt" }}
            {{- end }}
            {{- if .Values.global.mcpAuth.signingKeySecret }}
            - name: MCP_AUTH_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.mcpAuth.signingKeySecret }}
                  key: {{ .Values.global.mcpAuth.signingKeyField | default "key" }}
            {{- end }}
          resources:
            requests: {{ .Values.agentClaw.resources.requests | toYaml | nindent 14 }}
            limits:   {{ .Values.agentClaw.resources.limits | toYaml | nindent 14 }}
          securityContext:
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: agent-claw
spec:
  selector:
    app: agent-claw
  ports:
    - port: {{ .Values.agentClaw.port }}
      targetPort: {{ .Values.agentClaw.port }}
{{- end }}

