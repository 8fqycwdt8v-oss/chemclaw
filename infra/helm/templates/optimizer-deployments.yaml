# Optimizer deployments — enabled when optimizer.enabled=true
# GEPA runner, skill promoter, forged-tool validator run as CronJobs.
{{- if .Values.optimizer.enabled }}

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gepa-runner
  labels:
    app: gepa-runner
    profile: optimizer
spec:
  schedule: {{ .Values.optimizer.gepaRunner.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
          restartPolicy: OnFailure
          containers:
            - name: gepa-runner
              image: {{ .Values.optimizer.gepaRunner.image }}
              securityContext:
                allowPrivilegeEscalation: false

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: skill-promoter
  labels:
    app: skill-promoter
    profile: optimizer
spec:
  schedule: {{ .Values.optimizer.skillPromoter.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
          restartPolicy: OnFailure
          containers:
            - name: skill-promoter
              image: {{ .Values.optimizer.skillPromoter.image }}
              securityContext:
                allowPrivilegeEscalation: false

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: forged-tool-validator
  labels:
    app: forged-tool-validator
    profile: optimizer
spec:
  schedule: {{ .Values.optimizer.forgedToolValidator.schedule | quote }}
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
          restartPolicy: OnFailure
          containers:
            - name: forged-tool-validator
              image: {{ .Values.optimizer.forgedToolValidator.image }}
              securityContext:
                allowPrivilegeEscalation: false

# Session purger runs as a long-lived Deployment (continuous loop with
# its own internal sleep) rather than a CronJob — the daemon is cheap
# and starts/stops are noisier than the workload itself.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-purger
  labels:
    app: session-purger
    profile: optimizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-purger
  template:
    metadata:
      labels:
        app: session-purger
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: session-purger
          image: {{ .Values.optimizer.sessionPurger.image }}
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: POLL_INTERVAL_SECONDS
              value: {{ .Values.optimizer.sessionPurger.pollIntervalSeconds | quote }}
            - name: BATCH_SIZE
              value: {{ .Values.optimizer.sessionPurger.batchSize | quote }}
            - name: MIN_AGE_HOURS
              value: {{ .Values.optimizer.sessionPurger.minAgeHours | quote }}

{{- end }}
