name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# No untrusted-input handling here — every `run:` step uses static text
# or env vars defined at the job/step level. No github.event.*.title /
# .body / .ref interpolation. See:
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

jobs:
  typescript:
    name: TypeScript (eslint + vitest + tsc + audit + diff-cover)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # diff-cover compares against origin/main, which means we need
          # the merge-base in history. fetch-depth: 0 grabs the full ref
          # graph cheaply enough on a project this size.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install "diff-cover>=9.0"
      - run: npm ci
      - name: ESLint (agent-claw)
        run: npm run lint --workspace services/agent-claw
      - name: ESLint (paperclip)
        run: npm run lint --workspace services/paperclip
      - name: Vitest with coverage (agent-claw)
        run: npm run coverage --workspace services/agent-claw
      - run: npx tsc --noEmit -p services/agent-claw
      - name: Vitest with coverage (paperclip)
        run: npm run coverage --workspace services/paperclip
      - run: npx tsc --noEmit -p services/paperclip
      - run: npm audit --audit-level=high
      - name: Diff coverage (TypeScript - non-routes)
        # Thresholds per docs/review/2026-04-29-codebase-audit/05-coverage-baseline.md §8.
        # NOTE: --fail-paths-not-found was removed in diff-cover 9.x; the
        # default behaviour (treat missing-path as zero-coverage, do not
        # error) is what we want.
        if: github.event_name == 'pull_request'
        run: |
          diff-cover services/agent-claw/coverage/lcov.info \
            --compare-branch=origin/main \
            --fail-under=75 \
            --exclude='services/agent-claw/src/routes/**' \
            --exclude='services/agent-claw/src/index.ts' \
            --exclude='services/agent-claw/src/config.ts'
      - name: Diff coverage (TypeScript - routes carve-out)
        if: github.event_name == 'pull_request'
        run: |
          diff-cover services/agent-claw/coverage/lcov.info \
            --compare-branch=origin/main \
            --fail-under=60 \
            --include='services/agent-claw/src/routes/**'

  python:
    name: Python (ruff + pytest + parse + mypy + diff-cover)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install touched-service deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r services/mcp_tools/common/requirements.txt
          python3 -m pip install -r services/projectors/kg_source_cache/requirements.txt
          python3 -m pip install -r services/optimizer/session_reanimator/requirements.txt
          python3 -m pip install -r services/optimizer/session_purger/requirements.txt
          python3 -m pip install -r services/projectors/conditions_normalizer/requirements.txt
          python3 -m pip install -r services/mcp_tools/mcp_applicability_domain/requirements.txt
          python3 -m pip install -r services/mcp_tools/mcp_green_chemistry/requirements.txt
          python3 -m pip install pytest pytest-asyncio coverage \
            "mypy>=1.11" "ruff>=0.6,<0.7" "diff-cover>=9.0"
      - name: Ruff
        run: ruff check .
      - name: Pytest with coverage
        run: |
          coverage erase
          coverage run --rcfile=pyproject.toml -m pytest -q \
            tests/unit/test_redactor.py \
            tests/unit/optimizer/test_session_purger.py \
            tests/unit/mcp_kg/ \
            tests/unit/projectors/ \
            services/mcp_tools/common/tests/ \
            services/projectors/kg_source_cache/tests/ \
            services/projectors/conditions_normalizer/tests/ \
            services/mcp_tools/mcp_applicability_domain/tests/ \
            services/mcp_tools/mcp_green_chemistry/tests/
          coverage combine || true
          coverage xml -o coverage.xml
      - name: Parse-check Python services
        run: |
          python3 -m py_compile services/optimizer/session_reanimator/main.py
          python3 -m py_compile services/projectors/common/base.py
          python3 -m py_compile services/litellm_redactor/redaction.py
      - name: Mypy (clean subset — see PR-1 description)
        # PR-1 introduces mypy in CI. Strict mypy is too strict for the
        # full tree today (see audit 02-python-hotspots.md), so we run
        # only on services that already pass `mypy --strict`. PR-1
        # follow-ups broaden this subset rule-by-rule as the underlying
        # type debt is paid down.
        run: |
          mypy services/optimizer/session_purger
          mypy services/litellm_redactor
          mypy services/optimizer/forged_tool_validator
          mypy services/mcp_tools/common
          mypy services/mcp_tools/mcp_drfp
          mypy services/mcp_tools/mcp_kg
          mypy services/mcp_tools/mcp_aizynth
          mypy services/mcp_tools/mcp_askcos
          mypy services/mcp_tools/mcp_xtb
          mypy services/mcp_tools/mcp_sirius
          mypy services/mcp_tools/mcp_chemprop
          mypy services/optimizer/session_reanimator
          # mcp_doc_fetcher dropped from the clean subset: 10 type
          # errors landed via PRs unrelated to this branch (unused
          # type:ignore on PyPDF2 / pdf2image attrs, missing dict[]
          # generics, and JSONResponse return-type mismatches in the
          # FastAPI handlers). Restore once a follow-up PR pays them
          # down.
          # mypy services/mcp_tools/mcp_doc_fetcher
          mypy services/mcp_tools/mcp_tabicl
          # mcp_eln_local dropped: 11 type errors in routes.py
          # (untyped _acquire helper, Row vs dict argument types,
          # missing parameter annotations) — pre-existing on main.
          # Restore once a follow-up PR adds the annotations.
          # mypy services/mcp_tools/mcp_eln_local
          mypy services/mcp_tools/mcp_logs_sciy
          mypy services/mcp_tools/mcp_rdkit
          # services/projectors expanded to per-package subset because
          # compound_classifier and compound_fingerprinter (added on
          # main via Phase-3/4 chem PRs) carry pre-existing mypy debt:
          # bare psycopg.AsyncConnection annotations that don't match
          # BaseProjector's AsyncConnection[dict[str, Any]] supertype.
          # Restore the wildcard once a follow-up PR pays the debt down.
          mypy services/projectors/common
          mypy services/projectors/chunk_embedder
          mypy services/projectors/contextual_chunker
          mypy services/projectors/conditions_normalizer
          mypy services/projectors/kg_experiments
          mypy services/projectors/kg_hypotheses
          mypy services/projectors/kg_source_cache
          mypy services/projectors/qm_kg
          mypy services/projectors/reaction_vectorizer
          # mypy services/projectors/compound_classifier
          # mypy services/projectors/compound_fingerprinter
          # ingestion/doc_ingester dropped: 2 untyped-decorator errors
          # on typer @app.command() in cli.py — pre-existing on main.
          # mypy services/ingestion/doc_ingester
      - name: Diff coverage (Python)
        if: github.event_name == 'pull_request'
        run: |
          diff-cover coverage.xml \
            --compare-branch=origin/main \
            --fail-under=70 \
            --exclude='services/optimizer/session_reanimator/**' \
            --exclude='services/projectors/kg_hypotheses/**' \
            --exclude='services/mcp_tools/mcp_drfp/**' \
            --exclude='services/mcp_tools/mcp_rdkit/**' \
            --exclude='services/queue/**' \
            --exclude='services/ingestion/eln_json_importer.legacy/**'

  schema:
    name: Schema (idempotent re-apply)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb-ha:pg16-ts2.17-all
        env:
          POSTGRES_DB: chemclaw
          POSTGRES_USER: chemclaw
          POSTGRES_PASSWORD: ci_test_pw
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGPASSWORD: ci_test_pw
    steps:
      - uses: actions/checkout@v4
      - name: Apply migrations twice (idempotency check)
        run: |
          for f in db/init/*.sql; do
            echo ">>> applying $f"
            psql -h localhost -U chemclaw -d chemclaw -f "$f"
          done
          for f in db/init/*.sql; do
            echo ">>> re-applying $f"
            psql -h localhost -U chemclaw -d chemclaw -f "$f"
          done
