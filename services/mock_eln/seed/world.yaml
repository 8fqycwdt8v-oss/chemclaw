  buchwald_hartwig:
    solvent: { toluene: 4.0, "1,4-dioxane": 3.0, THF: -2.0, DMF: -3.0 }
    base: { Cs2CO3: 4.0, K3PO4: 3.0, NaOtBu: 2.0, KOtBu: 2.0, K2CO3: -1.0 }
    ligand: { XPhos: 5.0, RuPhos: 4.0, BINAP: 2.0, DPPF: 0.0 }
    temperature_c: { 80: 2.0, 100: 5.0, 110: 4.0, 120: 0.0 }
  sn_ar:
    solvent: { DMSO: 5.0, DMF: 4.0, MeCN: 1.0, THF: -3.0 }
    base: { DIPEA: 3.0, K2CO3: 2.0, Cs2CO3: 4.0, Et3N: 0.0 }
    temperature_c: { 80: 3.0, 100: 5.0, 110: 4.0, 120: 1.0, 25: -8.0 }
