# --------------------------------------------------------------------------
# Chemistry families (SMARTS reactions + fragment pools)
#
# Every reaction is rdkit.Chem.AllChem.ReactionFromSmarts compatible.
# Fragment SMILES are valid; reactions yield a single product with the
# expected connectivity. Yields are drawn from a noisy-regression model:
#   yield = base_yield(family, step) + condition_bonus + N(0, sigma).
# --------------------------------------------------------------------------
chemistry_families:
  - name: "amide_coupling"
    smarts: "[C:1](=[O:2])[OH].[N:3][H]>>[C:1](=[O:2])[N:3]"
    fragment_pools:
      acid:
        - "CC(=O)O"
        - "OC(=O)c1ccccc1"
        - "OC(=O)c1ccc(F)cc1"
        - "OC(=O)c1ccc(Cl)cc1"
        - "OC(=O)c1cccnc1"
        - "OC(=O)c1ccncc1"
        - "OC(=O)CCC"
        - "OC(=O)C1CCCCC1"
        - "OC(=O)c1ccc(OC)cc1"
        - "OC(=O)c1ccc(C)cc1"
      amine:
        - "NC"
        - "NCC"
        - "NCCC"
        - "NCCN"
        - "Nc1ccccc1"
        - "Nc1ccc(F)cc1"
        - "NCc1ccccc1"
        - "N1CCCCC1"
        - "N1CCNCC1"
        - "N1CCOCC1"
    base_yield_pct: 78.0
    yield_sigma: 6.5

  - name: "suzuki"
    smarts: "[c:1][Br].[c:2][B]([OH])[OH]>>[c:1][c:2]"
    fragment_pools:
      aryl_halide:
        - "Brc1ccccc1"
        - "Brc1ccc(F)cc1"
        - "Brc1ccc(Cl)cc1"
        - "Brc1ccc(OC)cc1"
        - "Brc1cccnc1"
        - "Brc1ccncc1"
        - "Brc1ccc(C(=O)C)cc1"
        - "Brc1ccc(C#N)cc1"
      aryl_boronic:
        - "OB(O)c1ccccc1"
        - "OB(O)c1ccc(F)cc1"
        - "OB(O)c1ccc(C)cc1"
        - "OB(O)c1ccc(OC)cc1"
        - "OB(O)c1cccnc1"
        - "OB(O)c1ccc(N)cc1"
    base_yield_pct: 72.0
    yield_sigma: 8.5

  - name: "buchwald_hartwig"
    smarts: "[c:1][Br].[N:2][H]>>[c:1][N:2]"
    fragment_pools:
      aryl_halide:
        - "Brc1ccccc1"
        - "Brc1ccc(C)cc1"
        - "Brc1ccc(OC)cc1"
        - "Brc1ccc(C(F)(F)F)cc1"
        - "Brc1cccnc1"
      amine:
        - "Nc1ccccc1"
        - "Nc1ccc(C)cc1"
        - "N1CCCCC1"
        - "N1CCN(C)CC1"
        - "N1CCOCC1"
        - "NCc1ccccc1"
    base_yield_pct: 68.0
    yield_sigma: 9.0

  - name: "sn_ar"
    smarts: "[c:1][F].[N:2][H]>>[c:1][N:2]"
    fragment_pools:
      aryl_fluoride:
        - "Fc1ccc([N+](=O)[O-])cc1"
        - "Fc1ccc(C#N)cc1"
        - "Fc1ccncc1"
        - "Fc1cccnc1"
        - "Fc1ncccn1"
      amine:
        - "NCc1ccccc1"
        - "NCC"
        - "N1CCNCC1"
        - "N1CCOCC1"
        - "Nc1ccccc1"
    base_yield_pct: 65.0
    yield_sigma: 10.0

  - name: "ester_hydrolysis"
    smarts: "[C:1](=[O:2])[O:3][C].[OH2]>>[C:1](=[O:2])[O:3][H]"
    fragment_pools:
      ester:
        - "COC(=O)c1ccccc1"
        - "COC(=O)CCC"
        - "COC(=O)C1CCCCC1"
        - "CCOC(=O)c1ccccc1"
        - "COC(=O)c1ccc(F)cc1"
        - "COC(=O)c1ccc(OC)cc1"
    base_yield_pct: 88.0
    yield_sigma: 4.0

  - name: "reductive_amination"
    smarts: "[C:1](=O).[N:2][H]>>[C:1][N:2]"
    fragment_pools:
      aldehyde:
        - "O=Cc1ccccc1"
        - "O=Cc1ccc(F)cc1"
        - "O=Cc1cccnc1"
        - "O=CCC"
        - "O=CC1CCCCC1"
      amine:
        - "NCc1ccccc1"
        - "NCC"
        - "NCCN"
        - "N1CCNCC1"
        - "Nc1ccccc1"
    base_yield_pct: 75.0
    yield_sigma: 7.0

  - name: "boc_deprotection"
    smarts: "[N:1]C(=O)OC(C)(C)C>>[N:1][H]"
    fragment_pools:
      boc_amine:
        - "CC(C)(C)OC(=O)NCc1ccccc1"
        - "CC(C)(C)OC(=O)N1CCCCC1"
        - "CC(C)(C)OC(=O)N1CCN(C)CC1"
        - "CC(C)(C)OC(=O)NCCN"
        - "CC(C)(C)OC(=O)Nc1ccccc1"
    base_yield_pct: 92.0
    yield_sigma: 3.5

  - name: "hydrogenation"
    smarts: "[C:1]=[C:2]>>[C:1][C:2]"
    fragment_pools:
      alkene:
        - "C=Cc1ccccc1"
        - "C=Cc1ccc(F)cc1"
        - "C=CCC"
        - "C=CC1CCCCC1"
        - "C=Cc1cccnc1"
    base_yield_pct: 85.0
    yield_sigma: 5.0

  - name: "oxidation"
    smarts: "[C:1][OH]>>[C:1]=O"
    fragment_pools:
      alcohol:
        - "OCc1ccccc1"
        - "OCc1ccc(F)cc1"
        - "OCCC"
        - "OCC1CCCCC1"
        - "OCc1cccnc1"
    base_yield_pct: 70.0
    yield_sigma: 8.0

  - name: "alkylation"
    smarts: "[N:1][H].[C:2][Br]>>[N:1][C:2]"
    fragment_pools:
      amine:
        - "N1CCCCC1"
        - "N1CCNCC1"
        - "Nc1ccccc1"
        - "NCc1ccccc1"
      alkyl_halide:
        - "BrCc1ccccc1"
        - "BrCC"
        - "BrCCC"
        - "BrCc1ccc(F)cc1"
        - "BrCC(=O)OC"
    base_yield_pct: 62.0
    yield_sigma: 9.5

# --------------------------------------------------------------------------
# OFAT campaigns. Each lists project + family + entry count + which
# condition axes are swept and over what value sets. The generator picks
# one canonical reaction per campaign and stamps `entries.reaction_id`.
# --------------------------------------------------------------------------
ofat_campaigns:
  - id: "NCE-1234-ofat-1"
    project_code: "NCE-1234"
    family: "amide_coupling"
    entry_count: 100
    sweep_axes: ["solvent", "base", "temperature_c", "equiv_amine"]
  - id: "NCE-1234-ofat-2"
    project_code: "NCE-1234"
    family: "suzuki"
    entry_count: 100
    sweep_axes: ["solvent", "ligand", "temperature_c", "catalyst_loading_mol_pct"]
  - id: "NCE-1234-ofat-3"
    project_code: "NCE-1234"
    family: "buchwald_hartwig"
    entry_count: 100
    sweep_axes: ["solvent", "base", "ligand", "temperature_c"]
  - id: "NCE-1234-ofat-4"
    project_code: "NCE-1234"
    family: "sn_ar"
    entry_count: 100
    sweep_axes: ["solvent", "base", "temperature_c"]

  - id: "GEN-9999-ofat-1"
    project_code: "GEN-9999"
    family: "amide_coupling"
    entry_count: 200
    sweep_axes: ["solvent", "base", "coupling_reagent", "temperature_c"]
  - id: "GEN-9999-ofat-2"
    project_code: "GEN-9999"
    family: "ester_hydrolysis"
    entry_count: 180
    sweep_axes: ["solvent", "base", "temperature_c", "time_h"]
  - id: "GEN-9999-ofat-3"
    project_code: "GEN-9999"
    family: "reductive_amination"
    entry_count: 160
    sweep_axes: ["solvent", "reductant", "temperature_c", "time_h"]
  - id: "GEN-9999-ofat-4"
    project_code: "GEN-9999"
    family: "hydrogenation"
    entry_count: 140
    sweep_axes: ["solvent", "catalyst", "pressure_psi", "temperature_c"]
  - id: "GEN-9999-ofat-5"
    project_code: "GEN-9999"
    family: "boc_deprotection"
    entry_count: 120
    sweep_axes: ["solvent", "acid", "temperature_c", "time_h"]

  - id: "FOR-1111-ofat-1"
    project_code: "FOR-1111"
    family: "alkylation"
    entry_count: 60
    sweep_axes: ["solvent", "base", "temperature_c"]

# --------------------------------------------------------------------------
# Condition pools — used both for OFAT sweeps (the axes above index into
# these) and for discovery-entry random condition variation.
# --------------------------------------------------------------------------
condition_pools:
  solvent:
    - "DMF"
    - "DMSO"
    - "THF"
    - "2-MeTHF"
    - "DCM"
    - "EtOAc"
    - "MeCN"
    - "MeOH"
    - "EtOH"
    - "water"
    - "toluene"
    - "1,4-dioxane"
  base:
    - "Et3N"
    - "DIPEA"
    - "K2CO3"
    - "Cs2CO3"
    - "NaOH"
    - "K3PO4"
    - "DBU"
    - "NaH"
    - "KOtBu"
  ligand:
    - "XPhos"
    - "SPhos"
    - "RuPhos"
    - "BINAP"
    - "tBuXPhos"
    - "DPPF"
    - "PCy3"
  catalyst:
    - "Pd(OAc)2"
    - "Pd(PPh3)4"
    - "Pd2(dba)3"
    - "Pd/C"
    - "PtO2"
    - "Rh/C"
  reductant:
    - "NaBH4"
    - "NaBH(OAc)3"
    - "STAB"
    - "NaCNBH3"
  acid:
    - "HCl"
    - "TFA"
    - "H2SO4"
    - "MsOH"
  coupling_reagent:
    - "HATU"
    - "EDC"
    - "TBTU"
    - "T3P"
    - "DCC"
    - "PyBOP"
  temperature_c: [0, 10, 25, 40, 50, 60, 80, 100, 110, 120]
  pressure_psi: [15, 30, 50, 80, 120, 200]
  time_h: [0.5, 1, 2, 4, 8, 16, 24, 48]
  equiv_amine: [1.0, 1.1, 1.2, 1.5, 2.0, 3.0]
  catalyst_loading_mol_pct: [0.5, 1.0, 2.5, 5.0, 10.0]

# --------------------------------------------------------------------------
# Condition bonuses per family — drives the noisy-regression yield. Bonuses
# are additive in pp (percentage points). Only a subset of conditions per
# family carries a real signal so OFAT exploration has something to learn.
# Anything not listed contributes 0.
# --------------------------------------------------------------------------
condition_bonuses:
  amide_coupling:
    solvent: { DMF: 5.0, DMSO: 3.0, THF: -2.0, MeCN: 1.0, water: -8.0 }
    base: { DIPEA: 4.0, Et3N: 2.0, NaOH: -10.0, NaH: -6.0 }
    coupling_reagent: { HATU: 5.0, T3P: 3.5, EDC: 0.0, DCC: -1.5 }
    temperature_c: { 25: 0.0, 40: 2.0, 60: -1.0, 80: -3.0, 100: -8.0 }
  suzuki:
