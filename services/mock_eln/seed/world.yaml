# Mock ELN — declarative world spec.
#
# Drives services/mock_eln/seed/generator.py. WORLD_SEED env var (default 42)
# controls determinism — same yaml + same seed → byte-identical COPY files.
#
# Structure:
#   projects[]            — 4 projects per the plan project mix
#   chemistry_families[]  — 10 SMARTS-templated reaction families
#   ofat_campaigns[]      — explicit OFAT specs naming a project + family +
#                           condition sweeps + entry count
#   condition_pools{}     — solvents/bases/ligands/temps/etc. used both for
#                           OFAT sweeps and discovery-entry condition variation
#   fragment_pools{}      — SMILES fragments fed into SMARTS templates to
#                           produce canonical reactions per family
#   timing                — global time bounds, weekday cadence, milestones

# --------------------------------------------------------------------------
# Time bounds (ISO 8601). Per-project overrides supported.
# --------------------------------------------------------------------------
timing:
  global_started_at: "2024-04-01T08:00:00+00:00"
  global_ended_at:   "2025-12-15T18:00:00+00:00"
  # Cadence: ~10–20 entries / chemist / month, bursty around milestones,
  # weekend gaps, holiday gaps near US holidays.
  entries_per_chemist_per_month_min: 10
  entries_per_chemist_per_month_max: 20
  weekend_gap_probability: 0.92        # 92% chance no entry on weekend day
  holiday_gap_dates:
    - "2024-05-27"   # Memorial Day
    - "2024-07-04"   # Independence Day
    - "2024-09-02"   # Labor Day
    - "2024-11-28"   # Thanksgiving
    - "2024-11-29"
    - "2024-12-24"
    - "2024-12-25"
    - "2024-12-31"
    - "2025-01-01"
    - "2025-05-26"
    - "2025-07-04"
    - "2025-09-01"
    - "2025-11-27"
    - "2025-11-28"

# --------------------------------------------------------------------------
# Distribution targets (used by generator; tests assert ±2pp)
# --------------------------------------------------------------------------
distributions:
  entry_shape:
    mixed: 0.80
    pure-structured: 0.07
    pure-freetext: 0.08
    # Remaining 5% balances rounding — the generator distributes via cumulative
    # bands; tests allow ±2pp. The plan reads 80/7/8/5 with the 5pp going to
    # additional `mixed` to keep the dominant shape dominant.
  data_quality_tier:
    clean: 0.50
    partial: 0.25
    noisy: 0.15
    failed: 0.10
  freetext_length_band:
    "30-80":     0.35
    "80-400":    0.40
    "400-1500":  0.20
    "1500-6000": 0.05
  freetext_quality:
    clean: 0.60
    abbreviated: 0.25
    typos: 0.10
    ocr_noise: 0.05

