# ChemClaw local dev stack.
# For production deployment see infra/helm/ (OpenShift-targeted).
# Secrets in .env — never commit real values.

services:
  # -------------------------------------------------------------
  # Postgres — app DB + pgvector + pgvectorscale
  # -------------------------------------------------------------
  postgres:
    image: timescale/timescaledb-ha:pg16-ts2.17-all
    container_name: chemclaw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chemclaw}
      POSTGRES_USER: ${POSTGRES_USER:-chemclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chemclaw_dev_password_change_me}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/home/postgres/pgdata/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chemclaw} -d ${POSTGRES_DB:-chemclaw}"]
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------
  # Neo4j — bi-temporal KG via Graphiti
  # -------------------------------------------------------------
  neo4j:
    image: neo4j:5.26-community
    container_name: chemclaw-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-chemclaw_dev_neo4j_change_me}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-chemclaw_dev_neo4j_change_me} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------
  # mcp-rdkit — cheminformatics tool server
  # -------------------------------------------------------------
  mcp-rdkit:
    build:
      context: .
      dockerfile: services/mcp_tools/mcp_rdkit/Dockerfile
    container_name: chemclaw-mcp-rdkit
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/healthz',timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------
  # mcp-drfp — reaction fingerprint tool server
  # -------------------------------------------------------------
  mcp-drfp:
    build:
      context: .
      dockerfile: services/mcp_tools/mcp_drfp/Dockerfile
    container_name: chemclaw-mcp-drfp
    restart: unless-stopped
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8002/healthz',timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------
  # mcp-kg — bi-temporal knowledge graph service
  # -------------------------------------------------------------
  mcp-kg:
    build:
      context: .
      dockerfile: services/mcp_tools/mcp_kg/Dockerfile
    container_name: chemclaw-mcp-kg
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-chemclaw_dev_neo4j_change_me}
      LOG_LEVEL: ${PROJECTOR_LOG_LEVEL:-INFO}
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8003/healthz',timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------
  # mcp-embedder — BGE-M3 text embeddings
  # -------------------------------------------------------------
  mcp-embedder:
    build:
      context: .
      dockerfile: services/mcp_tools/mcp_embedder/Dockerfile
    container_name: chemclaw-mcp-embedder
    restart: unless-stopped
    environment:
      EMBED_MODEL_NAME: ${EMBED_MODEL_NAME:-BAAI/bge-m3}
      EMBED_DEVICE: ${EMBED_DEVICE:-cpu}
      HF_HOME: /home/app/.cache/huggingface
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8004/healthz',timeout=2).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s  # long — first encode downloads the model
    volumes:
      - embedder-hf-cache:/home/app/.cache/huggingface
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------
  # kg_experiments — projector from experiment_imported events to KG
  # -------------------------------------------------------------
  kg-experiments:
    build:
      context: .
      dockerfile: services/projectors/kg_experiments/Dockerfile
    container_name: chemclaw-kg-experiments
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mcp-kg:
        condition: service_healthy
      mcp-rdkit:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chemclaw}
      POSTGRES_USER: ${POSTGRES_USER:-chemclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chemclaw_dev_password_change_me}
      MCP_KG_URL: http://mcp-kg:8003
      MCP_RDKIT_URL: http://mcp-rdkit:8001
      PROJECTOR_LOG_LEVEL: ${PROJECTOR_LOG_LEVEL:-INFO}
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------
  # doc_ingester — scans a docs directory, parses, chunks, emits events
  # (one-shot CLI; schedule via cron or replace CMD with inotify loop)
  # -------------------------------------------------------------
  doc-ingester:
    build:
      context: .
      dockerfile: services/ingestion/doc_ingester/Dockerfile
    container_name: chemclaw-doc-ingester
    restart: "no"
    profiles: ["ingest"]  # only starts with `docker compose --profile ingest up`
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chemclaw}
      POSTGRES_USER: ${POSTGRES_USER:-chemclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chemclaw_dev_password_change_me}
      DOCS_ROOT: /docs
    volumes:
      - ./sample-data/documents:/docs:ro
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------
  # chunk_embedder — BGE-M3 embeddings projector
  # -------------------------------------------------------------
  chunk-embedder:
    build:
      context: .
      dockerfile: services/projectors/chunk_embedder/Dockerfile
    container_name: chemclaw-chunk-embedder
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mcp-embedder:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chemclaw}
      POSTGRES_USER: ${POSTGRES_USER:-chemclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chemclaw_dev_password_change_me}
      MCP_EMBEDDER_URL: http://mcp-embedder:8004
      PROJECTOR_LOG_LEVEL: ${PROJECTOR_LOG_LEVEL:-INFO}
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------
  # reaction_vectorizer — DRFP projector
  # -------------------------------------------------------------
  reaction-vectorizer:
    build:
      context: .
      dockerfile: services/projectors/reaction_vectorizer/Dockerfile
    container_name: chemclaw-reaction-vectorizer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mcp-drfp:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-chemclaw}
      POSTGRES_USER: ${POSTGRES_USER:-chemclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chemclaw_dev_password_change_me}
      MCP_DRFP_URL: http://mcp-drfp:8002
      PROJECTOR_LOG_LEVEL: ${PROJECTOR_LOG_LEVEL:-INFO}
    security_opt:
      - no-new-privileges:true

  # -------------------------------------------------------------
  # LiteLLM — external-LLM egress chokepoint with redactor pre-call
  # Commented by default; uncomment after setting API keys in .env.
  # -------------------------------------------------------------
  # litellm:
  #   build:
  #     context: .
  #     dockerfile: services/litellm_redactor/Dockerfile
  #   container_name: chemclaw-litellm
  #   restart: unless-stopped
  #   environment:
  #     ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  #     OPENAI_API_KEY:    ${OPENAI_API_KEY}
  #     GOOGLE_API_KEY:    ${GOOGLE_API_KEY}
  #     LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
  #   ports:
  #     - "4000:4000"
  #   security_opt:
  #     - no-new-privileges:true

volumes:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  embedder-hf-cache:
